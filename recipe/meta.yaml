{% set name = "h5netcdf" %}
{% set version = "1.7.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: f62a0e77d1e2a6cd8b9d8120d5b62b6a015dc7c6185768a01e983c77c0b794e3

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<39]

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools >=42
    - setuptools-scm >=7.0
    - toml
  run:
    - h5py
    - python
    - packaging

test:
  imports:
    - h5netcdf
  commands:
    - pip check
    - pytest --pyargs h5netcdf
  requires:
    - pip
    - pytest
    - netCDF4

about:
  home: https://github.com/h5netcdf/h5netcdf
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  description: |
    A Python interface for the netCDF4 file-format that reads and writes local or remote HDF5 files directly via h5py
    or h5pyd, without relying on the Unidata netCDF library.
  summary: Pythonic interface to netCDF4 via h5py
  dev_url: https://github.com/h5netcdf/h5netcdf
  doc_url: https://github.com/h5netcdf/h5netcdf

extra:
  recipe-maintainers:
    - hmaarrfk
    - jhamman
    - ocefpaf
    - shoyer
    - kmuehlbauer
  skip-lints:
    - python_build_tool_in_run  # it complaints about packaging which is a run dep, not a host dep
